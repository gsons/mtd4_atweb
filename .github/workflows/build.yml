name: Build SquashFS

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install squashfs-tools
      run: sudo apt-get update && sudo apt-get install -y squashfs-tools

    - name: Run unpack.sh to extract mtd4
      run: |
        chmod +x unpack.sh
        ./unpack.sh

    - name: Copy files to squashfs-root
      run: |
        mkdir -p squashfs-root/sbin
        mkdir -p squashfs-root/web
        cp temp/atweb squashfs-root/sbin/
        cp temp/at.html squashfs-root/web/

    - name: Add startup commands to rc
      run: |
        chmod +w squashfs-root/etc/rc
        if ! grep -q "/sbin/atweb" squashfs-root/etc/rc; then
          echo "sleep 20" >> squashfs-root/etc/rc
          echo "/sbin/atweb &" >> squashfs-root/etc/rc
        fi

    - name: Run pack.sh to rebuild
      run: |
        chmod +x pack.sh
        ./pack.sh

    - name: Commit generated file
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add mtd4.new.bin
        git commit -m "Update mtd4.new.bin" || echo "No changes to commit"
        git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main --no-verify
