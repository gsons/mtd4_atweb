name: Build SquashFS

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install squashfs-tools
      run: sudo apt-get update && sudo apt-get install -y squashfs-tools

    - name: Run unpack.sh to extract mtd4
      run: |
        chmod +x unpack.sh
        ./unpack.sh

    - name: Copy files to squashfs-root
      run: |
        mkdir -p squashfs-root/sbin
        mkdir -p squashfs-root/web
        cp temp/atweb squashfs-root/sbin/
        cp temp/at.html squashfs-root/web/

    - name: Modify rc file
      run: |
        if [ ! -f "squashfs-root/etc/rc_fix" ]; then
          cp squashfs-root/etc/rc squashfs-root/etc/rc_fix
        fi
        sed -i 's|sysinit:/etc/rc|sysinit:/etc/rc_fix|g' squashfs-root/etc/inittab
        chmod +w squashfs-root/etc/rc_fix
        if ! grep -q "/sbin/atweb" squashfs-root/etc/rc_fix; then
          echo "sleep 20" >> squashfs-root/etc/rc_fix
          echo "/sbin/atweb &" >> squashfs-root/etc/rc_fix
        fi

    - name: Run pack.sh to rebuild
      run: |
        chmod +x pack.sh
        ./pack.sh

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: mtd4-new
        path: mtd4.new.bin
